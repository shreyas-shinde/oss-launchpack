name: Hosted deployment request
description: Request setup or hosted maintenance help for an OSS app.
title: "Hosted deployment: "
labels:
  - managed-deployment
body:
  - type: markdown
    attributes:
      value: |
        Use this when you want help deploying or maintaining an OSS app.
        Do not paste secrets, API keys, passwords, or private infrastructure credentials.
        Hosted support depends on the upstream project's current license, trademark policy, and commercial terms.
  - type: dropdown
    id: app
    attributes:
      label: App
      options:
        - Open WebUI
        - n8n
        - Memos
        - Other
    validations:
      required: true
  - type: dropdown
    id: plan
    attributes:
      label: Desired help
      options:
        - One-time setup
        - Managed monthly deployment
        - Not sure yet
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Target environment
      description: VPS/cloud provider, region, domain, and rough usage.
      placeholder: "Example: Hetzner VPS, US/EU region, app.example.com, 5 users."
    validations:
      required: true
  - type: textarea
    id: requirements
    attributes:
      label: Requirements
      description: Backups, SSO/OAuth, data migration, GPU, uptime, compliance, or support needs.
      placeholder: "Example: daily backups, Google OAuth, uptime alerts, restore testing."
    validations:
      required: true
  - type: input
    id: timeline
    attributes:
      label: Timeline
      placeholder: "Example: this week"
    validations:
      required: true
  - type: checkboxes
    id: acknowledgement
    attributes:
      label: Safety
      options:
        - label: I did not include secrets or credentials in this issue.
          required: true
        - label: I understand this request may require upstream license or trademark review.
          required: true
